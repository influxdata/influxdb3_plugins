name: Publish Registry

on:
  push:
    branches: [demo/public-registry-mvp]
    paths:
      - 'registry-guide/plugins/**'
      - 'registry-guide/index.json'
      - 'registry-guide/scripts/**'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

concurrency:
  group: registry-publish
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  S3_BUCKET: influxdb3-plugins-registry
  AWS_REGION: us-east-2
  AWS_ROLE_ARN: arn:aws:iam::752401886767:role/influxdb3-plugins-registry-ci
  GH_RELEASE_REPO: influxdata/influxdb3_plugins_dev
  GH_RELEASE_TAG: registry

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read SDK version
        id: sdk-version
        run: echo "version=$(cat registry-guide/.sdk-version)" >> "$GITHUB_OUTPUT"

      - name: Fetch influxdb3-plugin CLI
        env:
          GH_TOKEN: ${{ secrets.SDK_REPO_TOKEN }}
        run: |
          SDK_VERSION="${{ steps.sdk-version.outputs.version }}"
          gh release download "v${SDK_VERSION}" \
            --repo influxdata/influxdb3-plugin-sdk \
            --pattern "influxdb3-plugin-x86_64-unknown-linux-gnu.tar.gz" \
            --dir /tmp/sdk
          tar xzf /tmp/sdk/influxdb3-plugin-x86_64-unknown-linux-gnu.tar.gz \
            -C /usr/local/bin/ influxdb3-plugin
          influxdb3-plugin --version

      - name: Configure AWS credentials (OIDC)
        if: env.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials (static keys fallback)
        if: env.AWS_ROLE_ARN == ''
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch current index from S3
        run: |
          aws s3 cp \
            "s3://${{ env.S3_BUCKET }}/index.json" \
            /tmp/current-index.json

      - name: Run publish script
        run: |
          registry-guide/scripts/publish.sh \
            registry-guide/plugins \
            /tmp/current-index.json \
            /tmp/publish-output

      - name: Upload artifacts to S3
        run: |
          if ls /tmp/publish-output/artifacts/*.tar.gz 1>/dev/null 2>&1; then
            for artifact in /tmp/publish-output/artifacts/*.tar.gz; do
              aws s3 cp "$artifact" \
                "s3://${{ env.S3_BUCKET }}/artifacts/$(basename "$artifact")" \
                --content-type "application/gzip"
            done
          fi

      - name: Upload index to S3
        run: |
          aws s3 cp \
            /tmp/publish-output/index.json \
            "s3://${{ env.S3_BUCKET }}/index.json" \
            --content-type "application/json"

      - name: Verify S3 public access
        run: |
          echo "Fetching public index from S3..."
          curl -sS "https://${{ env.S3_BUCKET }}.s3.${{ env.AWS_REGION }}.amazonaws.com/index.json" \
            | python3 -m json.tool

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
        run: |
          GH_ARTIFACTS_URL="https://github.com/${{ env.GH_RELEASE_REPO }}/releases/download/${{ env.GH_RELEASE_TAG }}"

          # Generate a GitHub-flavored index with swapped artifacts_url
          mkdir -p /tmp/gh-release
          python3 -c "
          import json, sys
          with open('/tmp/publish-output/index.json') as f:
              idx = json.load(f)
          idx['artifacts_url'] = '${GH_ARTIFACTS_URL}'
          with open('/tmp/gh-release/index.json', 'w') as f:
              json.dump(idx, f, indent=2)
              f.write('\n')
          "

          # Sync all artifacts referenced in the index to the release.
          # For each entry, check if the asset exists; if not, download from S3 and upload.
          python3 -c "
          import json
          with open('/tmp/publish-output/index.json') as f:
              idx = json.load(f)
          for p in idx['plugins']:
              print(f\"{p['name']}-{p['version']}.tar.gz\")
          " | while read artifact_name; do
            # Check if already in the release
            if gh release view "${{ env.GH_RELEASE_TAG }}" --repo "${{ env.GH_RELEASE_REPO }}" \
                --json assets --jq ".assets[].name" | grep -qF "$artifact_name"; then
              echo "  $artifact_name: already in release"
              continue
            fi

            # Check if we just built it
            if [ -f "/tmp/publish-output/artifacts/$artifact_name" ]; then
              echo "  $artifact_name: uploading (new)"
              gh release upload "${{ env.GH_RELEASE_TAG }}" "/tmp/publish-output/artifacts/$artifact_name" \
                --repo "${{ env.GH_RELEASE_REPO }}" || true
              continue
            fi

            # Otherwise fetch from S3 and upload
            echo "  $artifact_name: syncing from S3"
            aws s3 cp "s3://${{ env.S3_BUCKET }}/artifacts/$artifact_name" "/tmp/gh-release/$artifact_name"
            gh release upload "${{ env.GH_RELEASE_TAG }}" "/tmp/gh-release/$artifact_name" \
              --repo "${{ env.GH_RELEASE_REPO }}" || true
          done

          # Upload index (overwrite)
          gh release upload "${{ env.GH_RELEASE_TAG }}" /tmp/gh-release/index.json \
            --repo "${{ env.GH_RELEASE_REPO }}" --clobber
