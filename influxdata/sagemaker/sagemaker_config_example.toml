# source_measurement = "motor_data"
# region = "eu-central-1"
# interval = "10min"
# limit = 5
# content_type = "application/json"
# accept = "application/json"
# json_shape = "instances_object"
# batch_inference = true

# feature_order = ["{motor_speed:speed}", "{ambient_temperature:temp}", "0.0:pad"]
# output_fields = ["label=predictions[*].label", "score=predictions[*].score"]

# target_measurement = "motor_predictions_obj"

# [tag_values]
# env = ["prod"]


