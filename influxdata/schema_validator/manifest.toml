manifest_schema_version = "1.2"

[plugin]
name = "schema_validator"
version = "0.1.0"
description = "Validates incoming line protocol data against a JSON schema."
triggers = ["process_writes"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/schema_validator"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/schema_validator/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!schema_validator.py",
]

[dependencies]
database_version = ">=3.8.2"
