manifest_schema_version = "1.2"

[plugin]
name = "stateless_adtk_detector"
version = "1.0.0"
description = "Provides anomaly detection capabilities for time series data using the ADTK library. Supports multiple stateless detectors with consensus-based detection and customizable notification messages."
triggers = ["process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/stateless_adtk_detector"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/stateless_adtk_detector/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!adtk_anomaly_detection_plugin.py",
]

[dependencies]
database_version = ">=3.0.0"
python = ["requests", "adtk", "pandas"]
