manifest_schema_version = "1.2"

[plugin]
name = "mad_check"
version = "1.0.0"
description = "Median Absolute Deviation (MAD)-based anomaly detection on writes. Maintains in-memory deques for efficient computation; supports count- and duration-based thresholds."
triggers = ["process_writes"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/mad_check"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/mad_check/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!mad_check_plugin.py",
]

[dependencies]
database_version = ">=3.0.0"
python = ["requests"]
