# #############################################################################
# EXAMPLE 6: Time-series forecasting — Chronos-Bolt (inputs_timeseries)
# #############################################################################
# Use for Amazon Chronos-Bolt and similar univariate forecasting models that
# expect {"inputs": [{"target": [v1, v2, ..., vN]}]}.
#
# How it works:
#   - limit=20 fetches 20 historical rows → all values collected into one target array
#   - batch_inference=true sends them in a single request
#   - forecast_output=true lets each output_fields path return an array;
#     array length = number of written rows (prediction_length)
#   - Scalar paths (if any) are broadcast to every forecast row
#
# Source measurement columns: time, value (univariate sensor reading)
# SageMaker response:
#   {"predictions": [{"mean": [...10 values...], "0.1": [...], "0.9": [...]}]}
#
# Note: quantile_levels uses semicolons as separator inside brackets.
# #############################################################################

# endpoint_name = "chronos-bolt-small-endpoint"
# source_measurement = "sensor_readings"
# region = "eu-central-1"
# interval = "1h"
# limit = 20
# content_type = "application/json"
# accept = "application/json"
# json_shape = "inputs_timeseries"
# batch_inference = true
# forecast_output = true

# Single {col} token required for inputs_timeseries
# feature_order = ["{value}"]

# mean is an array of prediction_length values → one row per forecast step
# quantile paths use quoted keys because "0.1" starts with a digit
# output_fields = [
#     "mean=predictions[0].mean",
#     "q10=predictions[0].\"0.1\"",
#     "q90=predictions[0].\"0.9\"",
# ]

# extra_body = [
#     "parameters.prediction_length=10",
#     "parameters.quantile_levels=[0.1;0.5;0.9]",
# ]

# target_measurement = "sensor_forecasts"