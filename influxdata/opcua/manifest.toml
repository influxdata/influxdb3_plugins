manifest_schema_version = "1.2"

[plugin]
name = "opcua"
version = "0.1.0"
description = "Periodic ingestion of OPC UA node values into InfluxDB 3. Connects to OPC UA servers (PLCs, SCADA, CNC) with auto-discovery browse mode, data type detection, and namespace resolution."
triggers = ["process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/opcua"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/opcua/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!opcua.py",
]

[dependencies]
database_version = ">=3.8.2"
python = ["asyncua"]
