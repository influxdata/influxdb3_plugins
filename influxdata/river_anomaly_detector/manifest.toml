manifest_schema_version = "1.2"

[plugin]
name = "river_anomaly_detector"
version = "0.1.0"
description = "Online time-series anomaly detection on writes using River ML, combining rolling statistics with HalfSpaceTrees for per-series scoring and optional auto-tuning."
triggers = ["process_writes"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/river_anomaly_detector"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/river_anomaly_detector/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!river_anomaly_detector.py",
]

[dependencies]
database_version = ">=3.8.2"
python = ["river>=0.23.0"]
