manifest_schema_version = "1.2"

[plugin]
name = "state_change"
version = "1.1.0"
description = "Provides field change and threshold monitoring capabilities through scheduler and data writes plugins. Detects changes in field values or threshold conditions with customizable notification templates."
triggers = ["process_writes", "process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/state_change"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/state_change/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!state_change_check_plugin.py",
]

[dependencies]
database_version = ">=3.0.0"
python = ["requests"]
