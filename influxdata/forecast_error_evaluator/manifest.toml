manifest_schema_version = "1.3"

[plugin]
name = "forecast_error_evaluator"
version = "1.1.0"
description = "Evaluates accuracy of forecast models by comparing predicted values with actual observations. Computes error metrics and detects anomalies based on elevated errors with multi-channel notifications."
triggers = ["process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/forecast_error_evaluator"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/forecast_error_evaluator/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!forecast_error_evaluator.py",
]

[dependencies]
database_version = ">=3.0.0"
python = ["pandas", "requests"]

[[dependencies.plugins]]
index_url = "https://github.com/influxdata/influxdb3_plugins/releases/download/registry/index.json"
name = "notifier"
version = ">=1.0.0,<2.0.0"
