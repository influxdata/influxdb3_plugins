# =============================================================================
# Kafka Subscriber Plugin - Configuration Examples
# =============================================================================
# This file contains configuration examples for different message formats
# and security configurations.
#
# To use one of these examples:
# 1. Copy this file to your PLUGIN_DIR directory
# 2. Keep only the [kafka] and [mapping.*] sections you need
# 3. Adjust the settings to match your Kafka cluster and message format
#
# File path resolution:
# - Absolute paths (e.g., /etc/kafka/ca.crt) are used as-is
# - Relative paths (e.g., certs/ca.crt) are resolved from PLUGIN_DIR
#
# Binary formats: 'avro', 'jsonschema', and 'protobuf' (Confluent wire format)
# are supported via Confluent Schema Registry (examples 11-13). 'protobuf' can
# also be decoded with a local .proto schema, and 'avro' as raw schemaless Avro
# with a local .avsc schema, without a registry (examples 13-14).
# =============================================================================


# #############################################################################
# EXAMPLE 1: JSON Format - IoT Sensor Data
# #############################################################################
# Use this configuration for structured JSON messages from IoT devices.
#
# Example Kafka message:
# {
#   "device_id": "sensor_001",
#   "location": "warehouse_a",
#   "readings": {
#     "temperature": 22.5,
#     "humidity": 65.2
#   },
#   "battery_level": 87,
#   "online": true,
#   "timestamp": 1704067200000
# }
# #############################################################################

[kafka]
bootstrap_servers = ["kafka1:9092", "kafka2:9092", "kafka3:9092"]
topics = ["sensors.temperature", "sensors.humidity"]
group_id = "influxdb3_iot_collector"
format = "json"

# Offset management
offset_commit_policy = "on_success"  # "on_success" or "always"
auto_offset_reset = "earliest"         # "earliest" or "latest"

# Performance tuning
max_poll_records = 500                 # Max messages per call (0 = unlimited)

# The consumer is reused across scheduled invocations (cached) so it stays in
# its group and no rebalance happens every cycle. It is only kept in the group
# while the gap between scheduled calls stays below max_poll_interval (seconds).
# Increase this if your trigger runs less often than every ~5 minutes.
max_poll_interval = 300                 # Seconds (maps to max.poll.interval.ms)

# Optional dead-letter queue: messages that fail to parse are published to this
# Kafka topic with the original payload/key and error details in the headers.
# The topic MUST already exist on the broker - the plugin does not create it.
# If auto-creation is disabled (typical in production), create it beforehand.
# dlq_topic = "sensor_data_dlq"

# Security (PLAINTEXT for development)
security_protocol = "PLAINTEXT"

# When true, full exception messages are logged. When false (default), only the
# exception type is logged, to avoid leaking sensitive values into log output.
# enable_full_logging = false

[mapping.json]
table_name = "sensor_data"

# Timestamp from message (milliseconds since epoch)
timestamp_field = "$.timestamp:ms"

# Tags: indexed fields for efficient filtering
[mapping.json.tags]
device_id = "$.device_id"
location = "$.location"

# Fields: measurement values with type specification
# Supported types: int, uint, float, string, bool
[mapping.json.fields]
temperature = ["$.readings.temperature", "float"]
humidity = ["$.readings.humidity", "float"]
battery_level = ["$.battery_level", "int"]
online = ["$.online", "bool"]


# #############################################################################
# EXAMPLE 2: Line Protocol Format - Passthrough Mode
# #############################################################################
# Use this configuration when Kafka messages are already in InfluxDB line protocol.
# No field mapping needed - messages are validated and written directly.
#
# Example Kafka message:
# weather,location=us-west,station=SF01 temperature=18.5,humidity=72i,pressure=1013.25 1704067200000000000
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["influxdb.metrics"]
# group_id = "influxdb3_lineprotocol"
# format = "lineprotocol"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"


# #############################################################################
# EXAMPLE 3: Text Format - Legacy Log Parsing
# #############################################################################
# Use this configuration for plain text messages that require regex parsing.
# Each tag and field uses a regex pattern with a capturing group.
#
# Example Kafka message:
# [2024-01-01T12:00:00Z] device=pump_003 location=plant_b flow_rate=125.7 pressure=45 status=running ts=1704110400000000000
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["legacy.equipment"]
# group_id = "influxdb3_legacy_parser"
# format = "text"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"

# [mapping.text]
# table_name = "equipment_logs"

# # Timestamp extraction (nanoseconds)
# # Format: "regex_pattern:format" - split by last colon
# timestamp_field = "ts=(\\d+):ns"

# # Tag patterns with capturing groups
# [mapping.text.tags]
# device = "device=(\\w+)"
# location = "location=(\\w+)"

# # Field patterns with type specification
# [mapping.text.fields]
# flow_rate = ["flow_rate=([\\d.]+)", "float"]
# pressure = ["pressure=(\\d+)", "int"]
# status = ["status=(\\w+)", "string"]


# #############################################################################
# EXAMPLE 4: SASL_PLAINTEXT Authentication
# #############################################################################
# Use this configuration for Kafka clusters with SASL authentication
# but without SSL encryption (internal networks only).
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka1:9092", "kafka2:9092"]
# topics = ["secure.metrics"]
# group_id = "influxdb3_sasl_consumer"
# format = "json"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "SASL_PLAINTEXT"

# [kafka.sasl]
# mechanism = "PLAIN"  # PLAIN, SCRAM-SHA-256, SCRAM-SHA-512
# username = "kafka_user"
# password = "kafka_password"

# [mapping.json]
# table_name = "secure_metrics"

# [mapping.json.tags]
# host = "$.host"

# [mapping.json.fields]
# value = ["$.value", "float"]


# #############################################################################
# EXAMPLE 5: SASL_SSL - Production Security Configuration
# #############################################################################
# Use this configuration for production environments with both
# SASL authentication and SSL encryption.
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka1.prod:9093", "kafka2.prod:9093", "kafka3.prod:9093"]
# topics = ["production.metrics", "production.events"]
# group_id = "influxdb3_production_consumer"
# format = "json"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "SASL_SSL"

# [kafka.sasl]
# mechanism = "SCRAM-SHA-512"
# username = "influxdb_service"
# password = "secure_password_here"

# [kafka.ssl]
# ca_cert = "/etc/influxdb/certs/ca.crt"
# # For mutual TLS (optional):
# # client_cert = "/etc/influxdb/certs/client.crt"
# # client_key = "/etc/influxdb/certs/client.key"

# [mapping.json]
# table_name = "production_metrics"
# timestamp_field = "$.ts:ms"

# [mapping.json.tags]
# host = "$.host"
# service = "$.service"
# environment = "$.env"

# [mapping.json.fields]
# cpu_usage = ["$.cpu", "float"]
# memory_mb = ["$.memory", "int"]
# requests_per_sec = ["$.rps", "float"]
# error_count = ["$.errors", "int"]


# #############################################################################
# EXAMPLE 6: SSL Only (No SASL)
# #############################################################################
# Use this configuration when Kafka uses SSL for encryption
# but no SASL authentication (certificate-based auth).
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka-ssl:9093"]
# topics = ["ssl.metrics"]
# group_id = "influxdb3_ssl_consumer"
# format = "json"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "SSL"

# [kafka.ssl]
# ca_cert = "certs/ca.crt"
# client_cert = "certs/client.crt"
# client_key = "certs/client.key"

# [mapping.json]
# table_name = "ssl_metrics"

# [mapping.json.fields]
# value = ["$.value", "float"]


# #############################################################################
# EXAMPLE 7: Dynamic Table Name from Message
# #############################################################################
# Use table_name_field to extract the table name from each message.
# Useful when different message types should go to different tables.
#
# Example Kafka message:
# {"measurement": "cpu_metrics", "host": "server01", "usage": 45.2}
# This will write to table "cpu_metrics"
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["metrics.all"]
# group_id = "influxdb3_dynamic_table"
# format = "json"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"

# [mapping.json]
# table_name_field = "$.measurement"

# [mapping.json.tags]
# host = "$.host"

# [mapping.json.fields]
# value = ["$.usage", "float"]


# #############################################################################
# EXAMPLE 8: Offset Commit Policy - "always"
# #############################################################################
# Use offset_commit_policy = "always" when you want to commit offsets
# even if some messages fail to process. This prevents reprocessing
# but may result in data loss for failed messages.
#
# Use cases:
# - High-throughput scenarios where occasional data loss is acceptable
# - When failed messages are logged elsewhere for later recovery
# - When you don't want processing errors to cause consumer lag
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["high-throughput.events"]
# group_id = "influxdb3_always_commit"
# format = "json"
# offset_commit_policy = "always"  # Commit even on errors
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"

# [mapping.json]
# table_name = "events"

# [mapping.json.fields]
# value = ["$.value", "float"]


# #############################################################################
# EXAMPLE 9: JSON Array Messages
# #############################################################################
# The plugin supports JSON arrays - each element is processed as a
# separate data point. Partial failures are handled gracefully.
#
# Example Kafka message:
# [
#   {"sensor_id": "001", "temperature": 22.5, "timestamp": 1638360000000},
#   {"sensor_id": "002", "temperature": 23.1, "timestamp": 1638360001000},
#   {"sensor_id": "003", "temperature": 21.8, "timestamp": 1638360002000}
# ]
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["batch.sensors"]
# group_id = "influxdb3_batch_processor"
# format = "json"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"

# [mapping.json]
# table_name = "batch_sensor_data"
# timestamp_field = "$.timestamp:ms"

# [mapping.json.tags]
# sensor_id = "$.sensor_id"

# [mapping.json.fields]
# temperature = ["$.temperature", "float"]


# #############################################################################
# EXAMPLE 10: Deduplication by message id (no message timestamp)
# #############################################################################
# When messages carry no timestamp, the plugin assigns the ingest time, so a
# re-delivered message (e.g. after a crash before the offset was committed)
# would create a duplicate point. dedup_id_field holds the extractor for a
# unique id carried in the message; the id is written under dedup_id_name and,
# before writing, the plugin checks whether that id already exists within
# dedup_window and skips duplicates.
#
# NOTE: deduplication is ONLY active when no timestamp_field is configured -
# with a message timestamp InfluxDB already overwrites by (tags, time).
#
# Performance: the check is a single query per table per cycle, constrained by
# both the time window and the batch ids. For very high-volume topics prefer a
# shorter dedup_window.
#
# Example Kafka message:
# {"event_id": "evt-8f3c1", "host": "server01", "value": 42.0}
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["events.dedup"]
# group_id = "influxdb3_dedup_consumer"
# format = "json"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"
# dedup_window = "24h"                  # e.g. "30m", "24h", "7d" (default 24h)

# [mapping.json]
# table_name = "events"
# # Do NOT set timestamp_field here - dedup is disabled when a timestamp is used.
# dedup_id_field = "$.event_id"        # JSONPath extractor for the unique id
# dedup_id_name = "event_id"           # Field to write/track the id under (default "dedup_id")

# [mapping.json.tags]
# host = "$.host"

# [mapping.json.fields]
# value = ["$.value", "float"]

# # Text format: dedup_id_field is a regex pattern with a capturing group:
# # [mapping.text]
# # dedup_id_field = "id=([\\w-]+)"
# # dedup_id_name = "event_id"


# #############################################################################
# EXAMPLE 11: Avro Format via Confluent Schema Registry
# #############################################################################
# Use this configuration for Avro-encoded messages in the Confluent wire format
# (magic byte + 4-byte schema id + payload). The schema is fetched from the
# Schema Registry by id; no local schema files are needed.
#
# The decoded record is a dict, so the mapping uses the same JSONPath syntax as
# the JSON format - just under [mapping.avro].
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["sensors.avro"]
# group_id = "influxdb3_avro_consumer"
# format = "avro"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"

# [kafka.schema_registry]
# schema_registry_url = "http://schema-registry:8081"
# # Basic auth (e.g. Confluent Cloud API key/secret):
# # schema_registry_username = "sr_api_key"
# # schema_registry_password = "sr_api_secret"
# # TLS to the registry (paths absolute or relative to PLUGIN_DIR):
# # schema_registry_ca_cert = "certs/sr_ca.crt"
# # schema_registry_client_cert = "certs/sr_client.crt"   # mutual TLS
# # schema_registry_client_key = "certs/sr_client.key"
# # schema_registry_client_key_password = "sr_key_password"  # only if the client key is encrypted

# [mapping.avro]
# table_name = "sensor_data"
# timestamp_field = "$.timestamp:ms"

# [mapping.avro.tags]
# device_id = "$.device_id"
# location = "$.location"

# [mapping.avro.fields]
# temperature = ["$.temperature", "float"]
# humidity = ["$.humidity", "float"]


# #############################################################################
# EXAMPLE 12: JSON Schema Format via Confluent Schema Registry
# #############################################################################
# Use this configuration for JSON-Schema-encoded messages in the Confluent wire
# format. The payload is validated against the schema fetched from the registry
# and decoded to a dict. Mapping uses JSONPath under [mapping.jsonschema].
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["events.jsonschema"]
# group_id = "influxdb3_jsonschema_consumer"
# format = "jsonschema"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"

# [kafka.schema_registry]
# schema_registry_url = "http://schema-registry:8081"

# [mapping.jsonschema]
# table_name = "events"
# timestamp_field = "$.ts:ms"

# [mapping.jsonschema.tags]
# host = "$.host"

# [mapping.jsonschema.fields]
# value = ["$.value", "float"]


# #############################################################################
# EXAMPLE 13: Protobuf Format (Confluent wire format)
# #############################################################################
# Use this configuration for Protobuf messages in the Confluent wire format
# (magic byte + schema id + message index). The schema source is chosen
# implicitly: set protobuf_schema_file for a LOCAL .proto (registry not
# contacted), or omit it and set schema_registry_url to fetch and compile the
# .proto (and any references) from the Schema Registry by the wire-frame schema
# id. The message index selects the message type.
#
# The 'grpcio-tools' package (bundles protoc to compile the .proto) is included
# in the plugin's dependencies and installed automatically.
#
# Note on MessageToDict semantics: proto3 scalar fields equal to their default
# (0, "", false) are omitted from the decoded record; int64/uint64 fields become
# strings; enums become their names; bytes become base64 strings.
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["sensors.protobuf"]
# group_id = "influxdb3_protobuf_consumer"
# format = "protobuf"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"

# Local .proto mode:
# [kafka.protobuf]
# protobuf_schema_file = "schemas/sensor.proto"   # path (absolute or relative to PLUGIN_DIR)
# # protobuf_include_dir = "schemas"               # optional: include dir for .proto imports
# # protobuf_message_type = "sensors.SensorReading" # optional: defaults to the wire message index

# Schema Registry mode (alternative): omit protobuf_schema_file and set the URL.
# The [kafka.protobuf] section can be omitted entirely.
# [kafka.schema_registry]
# schema_registry_url = "http://schema-registry:8081"

# [mapping.protobuf]
# table_name = "sensor_data"
# timestamp_field = "$.timestamp:ms"

# [mapping.protobuf.tags]
# device_id = "$.device_id"

# [mapping.protobuf.fields]
# temperature = ["$.temperature", "float"]
# humidity = ["$.humidity", "float"]


# #############################################################################
# EXAMPLE 14: Avro Format via Local Schema File (raw schemaless, no registry)
# #############################################################################
# Use this for Avro messages produced WITHOUT a Schema Registry (raw schemaless
# encoding, no Confluent wire header). The whole message value is the Avro body
# and is decoded with the local .avsc schema. Set avro_schema_file to switch the
# 'avro' format to this mode; the Schema Registry is not contacted.
#
# The decoded record is a dict, so mapping uses JSONPath under [mapping.avro].
# #############################################################################

# [kafka]
# bootstrap_servers = ["kafka:9092"]
# topics = ["sensors.avro"]
# group_id = "influxdb3_avro_file_consumer"
# format = "avro"
# offset_commit_policy = "on_success"
# auto_offset_reset = "earliest"
# security_protocol = "PLAINTEXT"

# [kafka.avro]
# avro_schema_file = "schemas/sensor.avsc"   # path (absolute or relative to PLUGIN_DIR)

# [mapping.avro]
# table_name = "sensor_data"
# timestamp_field = "$.timestamp:ms"

# [mapping.avro.tags]
# device_id = "$.device_id"

# [mapping.avro.fields]
# temperature = ["$.temperature", "float"]
# humidity = ["$.humidity", "float"]