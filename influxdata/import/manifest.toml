manifest_schema_version = "1.2"

[plugin]
name = "import"
version = "0.1.0"
description = "Enables seamless data import from InfluxDB v1, v2, or v3 instances to InfluxDB 3 Core/Enterprise."
triggers = ["process_request"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/import"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/import/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!import.py",
]

[dependencies]
database_version = ">=3.8.2"
python = ["requests"]
