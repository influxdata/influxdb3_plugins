manifest_schema_version = "1.2"

[plugin]
name = "signal_generator"
version = "0.1.0"
description = "Generates configurable waveform-based time-series data on a schedule for demos, testing, dashboards, alerts, and downstream plugin validation."
triggers = ["process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/signal_generator"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/signal_generator/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!signal_generator.py",
]

[dependencies]
database_version = ">=3.8.2"
