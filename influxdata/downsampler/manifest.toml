manifest_schema_version = "1.2"

[plugin]
name = "downsampler"
version = "1.0.0"
description = "Downsamples data in InfluxDB 3 with flexible configuration for time intervals, field aggregations, tag filtering, and batch processing. Supports scheduler and HTTP trigger modes."
triggers = ["process_scheduled_call", "process_request"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/downsampler"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/downsampler/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!downsampler.py",
]

[dependencies]
database_version = ">=3.0.0"
