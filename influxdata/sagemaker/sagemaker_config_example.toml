# #############################################################################
# EXAMPLE 4: LLM / HuggingFace JumpStart — extra_body for generation params
# #############################################################################
# Use for HuggingFace text-generation endpoints that accept:
# {"inputs": "...", "parameters": {"max_new_tokens": 50, "top_p": 0.95}}
# extra_body entries are merged into the JSON body at their dotted paths.
# #############################################################################

# endpoint_name = "hf-llm-endpoint"
# source_measurement = "prompts"
# region = "eu-west-1"
# interval = "30min"
# limit = 1
# content_type = "application/json"
# accept = "application/json"
# json_shape = "raw_object"
# batch_inference = false

# {col:alias} places the prompt under the "inputs" JSON key
# feature_order = ["{prompt_text:inputs}"]
# Most HuggingFace text-generation endpoints return [{"generated_text": "..."}];
# use [0].generated_text for single-row inference (batch_inference = false).
# output_fields = ["generated_text=[0].generated_text"]

# Each list element is one "dotted.path=value" entry merged into the body
# extra_body = [
#     "parameters.max_new_tokens=200",
#     "parameters.top_p=0.95",
#     "parameters.do_sample=true",
#     "parameters.temperature=0.7",
# ]

