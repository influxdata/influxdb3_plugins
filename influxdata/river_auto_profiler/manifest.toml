manifest_schema_version = "1.2"

[plugin]
name = "river_auto_profiler"
version = "0.2.0"
description = "Incrementally profiles time-series data with River ML streaming statistics and writes per-series recommendations for anomaly detection tuning, including thresholds, fading factors, and maturity."
triggers = ["process_writes"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/river_auto_profiler"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/river_auto_profiler/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!river_auto_profiler.py",
]

[dependencies]
database_version = ">=3.8.2"
python = ["river>=0.23.0"]
