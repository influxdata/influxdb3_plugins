# Anomaly Detector Plugin — Example TOML Configuration
# Use this file with: --trigger-arguments config_file_path=anomaly_detector_config.toml

# Target database for anomaly output (omit to write to same database)
# target_database = "analytics_db"

# Fields to exclude from anomaly detection (dot-separated)
# exclude_fields = "status.version"

# Tables to skip when using all_tables trigger (dot-separated)
# exclude_tables = "debug_info.system_logs"

# Rolling stats configuration
rolling_std_threshold = "5.0"
ew_fading_factor = "0.3"

# HalfSpaceTrees configuration
hst_quantile = "0.95"
hst_n_trees = "10"
hst_height = "6"
hst_window_size = "250"

# Series management
max_series = "100"

# Logging
log_anomalies = "true"
