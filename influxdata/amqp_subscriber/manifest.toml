manifest_schema_version = "1.2"

[plugin]
name = "amqp_subscriber"
version = "0.1.0"
description = "Real-time ingestion of AMQP messages (RabbitMQ and other AMQP-compatible brokers) into InfluxDB 3. Subscribe to queues and transform messages into time-series data."
triggers = ["process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/amqp_subscriber"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/amqp_subscriber/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!amqp_subscriber.py",
]

[dependencies]
database_version = ">=3.8.2"
python = ["pika", "jsonpath-ng"]
