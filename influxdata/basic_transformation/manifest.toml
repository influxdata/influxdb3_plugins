manifest_schema_version = "1.2"

[plugin]
name = "basic_transformation"
version = "1.0.0"
description = "Enables transformation of time series data stored in InfluxDB 3 (transformations are supported for field/tag names and values)."
triggers = ["process_writes", "process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/basic_transformation"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/basic_transformation/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!basic_transformation.py",
]

[dependencies]
database_version = ">=3.0.0"
python = ["pint>=0.20"]
