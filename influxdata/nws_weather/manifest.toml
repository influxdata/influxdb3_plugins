manifest_schema_version = "1.2"

[plugin]
name = "nws_weather"
version = "1.0.0"
description = "Real-time weather data from the US National Weather Service API for demonstration and sample data. Fetches live observations from multiple US weather stations."
triggers = ["process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/nws_weather"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/nws_weather/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!nws_weather_sampler.py",
]

[dependencies]
database_version = ">=3.0.0"
