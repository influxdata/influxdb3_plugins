manifest_schema_version = "1.2"

[plugin]
name = "prophet_forecasting"
version = "1.0.0"
description = "Provides time series forecasting capabilities for InfluxDB 3 data using the Prophet library."
triggers = ["process_scheduled_call", "process_request"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/prophet_forecasting"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/prophet_forecasting/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!prophet_forecasting.py",
]

[dependencies]
database_version = ">=3.0.0"
python = ["pandas", "requests", "prophet", "numpy"]
