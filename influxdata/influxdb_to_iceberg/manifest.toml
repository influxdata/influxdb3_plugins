manifest_schema_version = "1.2"

[plugin]
name = "influxdb_to_iceberg"
version = "1.1.0"
description = "Transfers data from InfluxDB 3 to Apache Iceberg tables with automatic schema management, customizable namespace and table naming, field filtering, and batch processing support."
triggers = ["process_scheduled_call", "process_request"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/influxdb_to_iceberg"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/influxdb_to_iceberg/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!influxdb_to_iceberg.py",
]

[dependencies]
database_version = ">=3.0.0"
python = ["pandas", "pyarrow", "pyiceberg[s3fs,hive,sql-sqlite]"]
