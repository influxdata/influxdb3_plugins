manifest_schema_version = "1.2"

[plugin]
name = "kafka_subscriber"
version = "0.4.0"
description = "Ingests Kafka messages into InfluxDB 3 with JSON, Line Protocol, text, Avro, JSON Schema, and Protobuf decoding, plus Schema Registry and local schema support."
triggers = ["process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/kafka_subscriber"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/kafka_subscriber/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!kafka_subscriber.py",
]

[dependencies]
database_version = ">=3.8.2"
python = ["confluent-kafka>=2.15.0", "jsonpath-ng", "httpx", "fastavro", "jsonschema", "grpcio-tools>=1.54.0", "protobuf>=4.22.0", "authlib", "cachetools"]
