manifest_schema_version = "1.2"

[plugin]
name = "resampler"
version = "0.1.0"
description = "Resamples time series with non-uniform timestamps onto a uniform time grid via configurable interpolation, or snaps timestamps to grid nodes keeping values and types unchanged."
triggers = ["process_scheduled_call"]
homepage = "https://www.influxdata.com/"
repository = "https://github.com/influxdata/influxdb3_plugins/tree/main/influxdata/resampler"
documentation = "https://github.com/influxdata/influxdb3_plugins/blob/main/influxdata/resampler/README.md"
exclude = [
  ".git/", ".venv/", "__pycache__/", "*.pyc", "tests/**",
  ".claude/", ".vscode/", ".idea/", ".DS_Store",
  "*.py", "!resampler.py",
]

[dependencies]
database_version = ">=3.8.2"
python = ["influxdata-plugin-utils>=0.2.0", "scipy"]