# =============================================================================
# SageMaker Inference Plugin - Configuration Examples
# =============================================================================
# This file contains configuration examples for different SageMaker endpoint
# types: array-based, object-based, CSV, and LLM (HuggingFace / JumpStart).
#
# To use one of these examples:
# 1. Copy this file to your plugin directory (--plugin-dir / INFLUXDB3_PLUGIN_DIR)
# 2. Keep only the example that matches your endpoint
# 3. Adjust the values to match your endpoint and source measurement
# 4. Pass "config_file_path = sagemaker_config.toml" in the trigger args
#
# File path resolution:
# - Absolute paths (e.g., /etc/plugins/config.toml) are used as-is
# - Relative paths (e.g., sagemaker_config.toml) are resolved from the plugin
#   directory (INFLUXDB3_PLUGIN_DIR, falling back to PLUGIN_DIR)
# =============================================================================


# #############################################################################
# EXAMPLE 1: Standard inference — instances_array (built-in algorithms)
# #############################################################################
# Use for SageMaker built-in algorithms (Linear Learner, k-NN, KMeans, etc.)
# that expect {"instances": [[v1, v2, ...], ...]}.
#
# Source measurement columns: time, motor_speed, ambient_temperature, sensor_id
# SageMaker response: {"predictions": [{"score": 0.9}, {"score": 0.7}]}
# #############################################################################

endpoint_name = "my-endpoint-2025-01-15"
source_measurement = "motor_data"
region = "eu-central-1"
interval = "5min"
limit = 10
content_type = "application/json"
accept = "application/json"
json_shape = "instances_array"
batch_inference = true

# Each list element is one token: {column}, {column:alias}, or a literal value
feature_order = ["{motor_speed}", "{ambient_temperature}", "0.0"]

# Each list element is one "output_field_name=jmespath" mapping
output_fields = ["score=predictions[*].score"]

target_measurement = "motor_predictions"
# target_database = "forecasts"   # omit to write to the trigger's database

# Tag filters — only query rows where sensor_id is in the list
[tag_values]
sensor_id = ["A1", "A2"]


# #############################################################################
# EXAMPLE 2: Object-shaped request — instances_object
# #############################################################################
# Use when the endpoint expects named keys instead of positional arrays:
# {"instances": [{"speed": 42.0, "temp": 21.5, "pad": 0.0}, ...]}
# Literals MUST use the "literal:alias" form so they get a JSON key.
# #############################################################################

